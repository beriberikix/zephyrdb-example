manifest:
  version: "0.13"

  remotes:
    - name: zephyrproject
      url-base: https://github.com/zephyrproject-rtos
    - name: beriberikix
      url-base: https://github.com/beriberikix

  projects:
    - name: zephyr
      remote: zephyrproject
      revision: main
      import:
        name-allowlist:
          - littlefs

    - name: zephyrdb
      remote: beriberikix
      revision: main
      path: modules/lib/zephyrdb

    # FlatBuffers support: flatcc-zephyr wraps upstream flatcc for Zephyr.
    # Run: git -C modules/lib/flatcc-zephyr submodule update --init
    - name: flatcc-zephyr
      remote: beriberikix
      revision: main
      path: modules/lib/flatcc-zephyr

  self:
    path: zephyrdb-example
